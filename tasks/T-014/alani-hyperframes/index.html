<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #030407;
        font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      }
      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 12%, rgba(34,243,255,0.16), transparent 30%),
          radial-gradient(circle at 82% 88%, rgba(255,44,191,0.18), transparent 32%),
          linear-gradient(180deg, #05060c 0%, #111320 44%, #070811 100%);
      }
      .clip { position: absolute; will-change: transform, opacity, filter; }
      .band {
        left: 0;
        width: 1080px;
        overflow: hidden;
      }
      #top-band { top: 0; height: 656px; }
      #bottom-band { top: 1264px; height: 656px; }
      .band::before {
        content: "";
        position: absolute;
        inset: -60px;
        background:
          linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.08) 46%, transparent 58%),
          repeating-linear-gradient(90deg, rgba(255,255,255,0.032) 0 1px, transparent 1px 42px);
        opacity: 0.55;
        filter: blur(1px);
      }
      #image-wrap {
        left: 0;
        top: 656px;
        width: 1080px;
        height: 608px;
        overflow: hidden;
        border-top: 2px solid rgba(255,255,255,0.18);
        border-bottom: 2px solid rgba(255,255,255,0.18);
        box-shadow: 0 0 64px rgba(34,243,255,0.16), 0 0 90px rgba(255,44,191,0.16);
        background: #090a10;
      }
      #scene {
        left: 0;
        top: 0;
        width: 1080px;
        height: 608px;
        object-fit: cover;
        transform-origin: 52% 66%;
      }
      #image-glow {
        inset: 0;
        background:
          radial-gradient(circle at 50% 62%, transparent 34%, rgba(0,0,0,0.28) 100%),
          linear-gradient(90deg, rgba(0,0,0,0.28), transparent 18%, transparent 82%, rgba(0,0,0,0.28));
        pointer-events: none;
      }
      #scan {
        left: -270px;
        top: 0;
        width: 230px;
        height: 1920px;
        transform: skewX(-16deg);
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
        filter: blur(28px);
        opacity: 0;
      }
      .laser {
        width: 1380px;
        height: 7px;
        left: -190px;
        border-radius: 999px;
        filter: blur(3px);
        opacity: 0;
        transform-origin: 50% 50%;
      }
      #laser-a { top: 310px; background: #22f3ff; box-shadow: 0 0 38px #22f3ff; transform: rotate(-14deg); }
      #laser-b { top: 1510px; background: #ff2cbf; box-shadow: 0 0 42px #ff2cbf; transform: rotate(12deg); }
      .spark {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 18px rgba(255,255,255,0.95), 0 0 34px rgba(34,243,255,0.7);
        opacity: 0;
      }
      #spark-a { left: 155px; top: 442px; }
      #spark-b { right: 178px; top: 1412px; }
      #spark-c { left: 810px; top: 1695px; }
      .copy {
        left: 68px;
        right: 68px;
        color: #fff;
        text-align: center;
        text-shadow: 0 8px 28px rgba(0,0,0,0.88), 0 0 32px rgba(34,243,255,0.22);
      }
      #top-caption {
        top: 172px;
        font-size: 66px;
        line-height: 1.06;
        font-weight: 950;
        letter-spacing: 0;
        text-transform: uppercase;
      }
      #top-kicker {
        top: 462px;
        font-size: 29px;
        font-weight: 850;
        letter-spacing: 7px;
        color: #82fff5;
        text-transform: uppercase;
      }
      #bottom-caption {
        top: 1378px;
        font-size: 50px;
        line-height: 1.14;
        font-weight: 920;
        letter-spacing: 0;
      }
      #bottom-cta {
        left: 166px;
        right: 166px;
        top: 1690px;
        height: 94px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(255,255,255,0.76);
        border-radius: 8px;
        background: rgba(5, 6, 11, 0.72);
        color: #ffffff;
        font-size: 32px;
        font-weight: 950;
        letter-spacing: 4px;
        text-transform: uppercase;
        text-shadow: 0 3px 18px rgba(0,0,0,0.95);
        box-shadow: 0 0 42px rgba(255,44,191,0.34), inset 0 0 34px rgba(34,243,255,0.2);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="1080" data-height="1920">
      <div id="top-band" class="clip band" data-start="0" data-duration="12" data-track-index="1"></div>
      <div id="bottom-band" class="clip band" data-start="0" data-duration="12" data-track-index="2"></div>
      <div id="image-wrap" class="clip" data-start="0" data-duration="12" data-track-index="3">
        <img id="scene" class="clip" src="assets/images/alani_scene_v2.png" data-layout-allow-overflow data-start="0" data-duration="12" data-track-index="4" alt="" />
        <div id="image-glow" class="clip" data-start="0" data-duration="12" data-track-index="5"></div>
      </div>
      <div id="laser-a" class="clip laser" data-start="0.4" data-duration="11.2" data-track-index="6"></div>
      <div id="laser-b" class="clip laser" data-start="0.8" data-duration="11" data-track-index="7"></div>
      <div id="scan" class="clip" data-start="0.7" data-duration="10.4" data-track-index="8"></div>
      <div id="spark-a" class="clip spark" data-start="1.2" data-duration="10.6" data-track-index="9"></div>
      <div id="spark-b" class="clip spark" data-start="1.8" data-duration="9.8" data-track-index="10"></div>
      <div id="spark-c" class="clip spark" data-start="2.4" data-duration="9.2" data-track-index="11"></div>

      <div id="top-caption" class="clip copy" data-start="0.2" data-duration="11.6" data-track-index="12">When the last set hits<br />and the night's just getting started ⚡</div>
      <div id="top-kicker" class="clip copy" data-start="0.6" data-duration="11" data-track-index="13">Alani Nu Beach Blend</div>
      <div id="bottom-caption" class="clip copy" data-start="0.45" data-duration="11.3" data-track-index="14">Three flavors to keep you moving till sunrise 🌃</div>
      <div id="bottom-cta" class="clip copy" data-start="0.8" data-duration="11" data-track-index="15">Tap to grab your festival fuel</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#scene", { scale: 1.015, x: -12, y: 6, duration: 12, ease: "none" }, 0)
        .to("#scene", { scale: 1.09, x: 16, y: -8, duration: 12, ease: "none" }, 0)
        .from("#image-wrap", { opacity: 0, scale: 0.985, duration: 0.6, ease: "power2.out" }, 0.05)

        .from("#top-caption", { opacity: 0, y: -54, duration: 0.62, ease: "power3.out" }, 0.24)
        .from("#top-kicker", { opacity: 0, y: 24, duration: 0.46, ease: "power2.out" }, 0.68)
        .from("#bottom-caption", { opacity: 0, y: 54, duration: 0.62, ease: "power3.out" }, 0.42)
        .from("#bottom-cta", { opacity: 0, y: 58, scale: 0.94, duration: 0.58, ease: "back.out(1.7)" }, 0.88)
        .to("#bottom-cta", { scale: 1.035, duration: 0.38, ease: "sine.inOut", yoyo: true, repeat: 7, repeatDelay: 0.82 }, 2.0)

        .to("#top-band", { x: 18, duration: 5.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0)
        .to("#bottom-band", { x: -20, duration: 5.3, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0.2)
        .from("#laser-a", { opacity: 0, x: -180, duration: 0.35 }, 0.7)
        .to("#laser-a", { opacity: 0.6, x: 180, duration: 1.75, yoyo: true, repeat: 5, ease: "sine.inOut" }, 1.05)
        .from("#laser-b", { opacity: 0, x: 210, duration: 0.35 }, 1.0)
        .to("#laser-b", { opacity: 0.54, x: -180, duration: 1.55, yoyo: true, repeat: 6, ease: "sine.inOut" }, 1.3)
        .to("#scan", { opacity: 0.58, x: 1580, duration: 1.05, ease: "power2.inOut", repeat: 4, repeatDelay: 1.35 }, 1.0)
        .to(".spark", { opacity: 0.88, scale: 1.8, duration: 0.26, yoyo: true, repeat: 13, repeatDelay: 0.52, stagger: 0.18, ease: "sine.inOut" }, 1.3)

        .to(["#top-caption", "#top-kicker", "#bottom-caption", "#bottom-cta"], { opacity: 0, duration: 0.45, ease: "power2.in" }, 11.45);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
