<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #05060b;
        font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      }
      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #05060b;
      }
      .clip { position: absolute; will-change: transform, opacity, filter; }
      #scene {
        inset: -90px -50px;
        width: 1180px;
        height: 2100px;
        object-fit: cover;
        transform-origin: 50% 58%;
      }
      #vignette {
        inset: 0;
        background:
          radial-gradient(circle at 50% 47%, rgba(255,255,255,0.08), transparent 29%),
          linear-gradient(180deg, rgba(0,0,0,0.22) 0%, transparent 29%, rgba(0,0,0,0.14) 59%, rgba(0,0,0,0.74) 100%),
          radial-gradient(circle at 50% 50%, transparent 38%, rgba(0,0,0,0.42) 100%);
        mix-blend-mode: normal;
      }
      #scan {
        left: -220px;
        top: 0;
        width: 260px;
        height: 1920px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.32), transparent);
        filter: blur(28px);
        opacity: 0;
        transform: skewX(-14deg);
      }
      .laser {
        width: 1380px;
        height: 10px;
        left: -150px;
        top: 530px;
        border-radius: 999px;
        filter: blur(2px);
        opacity: 0;
        transform-origin: 50% 50%;
      }
      #laser-a { background: #22f3ff; box-shadow: 0 0 36px #22f3ff; transform: rotate(-31deg); }
      #laser-b { background: #ff2cbf; box-shadow: 0 0 36px #ff2cbf; top: 720px; transform: rotate(24deg); }
      .copy {
        left: 70px;
        right: 70px;
        text-align: center;
        color: #fff;
        text-transform: uppercase;
        text-shadow: 0 8px 34px rgba(0,0,0,0.85), 0 0 28px rgba(0,230,255,0.26);
      }
      #eyebrow {
        top: 112px;
        font-size: 34px;
        font-weight: 800;
        letter-spacing: 12px;
        color: #82fff5;
      }
      #title {
        top: 168px;
        font-size: 92px;
        line-height: 0.95;
        font-weight: 950;
        letter-spacing: 0;
      }
      #beat {
        top: 1320px;
        font-size: 70px;
        line-height: 1.02;
        font-weight: 950;
        letter-spacing: 0;
      }
      #sub {
        top: 1492px;
        font-size: 36px;
        font-weight: 800;
        letter-spacing: 7px;
        color: #ffd6fb;
      }
      #cta {
        left: 156px;
        right: 156px;
        bottom: 94px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(255,255,255,0.78);
        border-radius: 8px;
        color: #ffffff;
        background: rgba(5, 6, 11, 0.72);
        font-size: 36px;
        font-weight: 950;
        letter-spacing: 4px;
        text-transform: uppercase;
        text-shadow: 0 3px 18px rgba(0,0,0,0.95);
        box-shadow: 0 0 42px rgba(255,71,207,0.35), inset 0 0 34px rgba(34,243,255,0.22);
      }
      #caption {
        left: 72px;
        right: 72px;
        bottom: 215px;
        color: rgba(255,255,255,0.9);
        font-size: 34px;
        line-height: 1.25;
        font-weight: 750;
        text-align: center;
        text-shadow: 0 5px 24px rgba(0,0,0,0.9);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="1080" data-height="1920">
      <img id="scene" class="clip" src="assets/images/alani_scene.png" data-start="0" data-duration="12" data-track-index="1" alt="" />
      <div id="vignette" class="clip" data-start="0" data-duration="12" data-track-index="2"></div>
      <div id="laser-a" class="clip laser" data-start="0.4" data-duration="11" data-track-index="3"></div>
      <div id="laser-b" class="clip laser" data-start="1.2" data-duration="10" data-track-index="4"></div>
      <div id="scan" class="clip" data-start="0.6" data-duration="10" data-track-index="5"></div>

      <div id="eyebrow" class="clip copy" data-start="0" data-duration="5.4" data-track-index="6">Festival Fuel</div>
      <div id="title" class="clip copy" data-start="0" data-duration="5.4" data-track-index="7">Alani<br />Night Run</div>

      <div id="beat" class="clip copy" data-start="4.2" data-duration="4.8" data-track-index="8">Three Flavors.<br />One More Set.</div>
      <div id="sub" class="clip copy" data-start="5.0" data-duration="4.0" data-track-index="9">Energy till sunrise</div>

      <div id="caption" class="clip" data-start="8.4" data-duration="3.6" data-track-index="10">When the last set hits and the night's just getting started.</div>
      <div id="cta" class="clip" data-start="8.8" data-duration="3.2" data-track-index="11">Tap to grab yours</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#scene", { scale: 1.08, y: 38, duration: 12, ease: "none" }, 0)
        .from("#eyebrow", { opacity: 0, y: -34, duration: 0.45, ease: "power2.out" }, 0.25)
        .from("#title", { opacity: 0, y: 54, scale: 0.92, duration: 0.7, ease: "back.out(1.7)" }, 0.5)
        .to("#title", { scale: 1.035, duration: 0.45, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.1)
        .to(["#eyebrow", "#title"], { opacity: 0, y: -20, duration: 0.38, ease: "power2.in" }, 4.65)

        .from("#laser-a", { opacity: 0, x: -180, duration: 0.35 }, 0.6)
        .to("#laser-a", { opacity: 0.76, x: 180, duration: 1.8, yoyo: true, repeat: 4, ease: "sine.inOut" }, 0.95)
        .from("#laser-b", { opacity: 0, x: 220, duration: 0.35 }, 1.2)
        .to("#laser-b", { opacity: 0.66, x: -180, duration: 1.55, yoyo: true, repeat: 5, ease: "sine.inOut" }, 1.5)
        .to("#scan", { opacity: 0.7, x: 1540, duration: 1.0, ease: "power2.inOut", repeat: 4, repeatDelay: 1.45 }, 0.8)

        .from("#beat", { opacity: 0, y: 70, scale: 0.94, duration: 0.5, ease: "power3.out" }, 4.4)
        .from("#sub", { opacity: 0, y: 30, duration: 0.45, ease: "power2.out" }, 5.05)
        .to("#beat", { scale: 1.03, duration: 0.36, ease: "sine.inOut", yoyo: true, repeat: 2 }, 6.2)
        .to(["#beat", "#sub"], { opacity: 0, y: 28, duration: 0.35, ease: "power2.in" }, 8.35)

        .from("#caption", { opacity: 0, y: 42, duration: 0.45, ease: "power2.out" }, 8.55)
        .from("#cta", { opacity: 0, y: 64, scale: 0.92, duration: 0.55, ease: "back.out(1.8)" }, 8.85)
        .to("#cta", { scale: 1.04, duration: 0.34, ease: "sine.inOut", yoyo: true, repeat: 3 }, 10.0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
